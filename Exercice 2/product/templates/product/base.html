{% load static tailwind_tags %}
<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://fonts.googleapis.com/css2?family=Clash+Display:wght@500;600;700&family=Cabinet+Grotesk:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Gestion des Produits</title>
    {% tailwind_css %}
  </head>
  <body>
    <style>
      :root {
        --amber: #d97706;
        --amber-light: #fef3c7;
        --amber-mid: #f59e0b;
        --dark: #1a1209;
        --dark-2: #2c1f0e;
        --dark-3: #3d2c14;
        --ink: #1c120a;
        --parchment: #fdf6ec;
        --parchment-2: #f9eed8;
        --sand: #e8d5b0;
      }

      * {
        box-sizing: border-box;
      }

      body {
        font-family: "Cabinet Grotesk", sans-serif;
        background-color: var(--parchment);
      }

      .font-display {
        font-family: "Clash Display", sans-serif;
      }

      /* --- Layout --- */
      .page-wrapper {
        min-height: 100vh;
        background: var(--parchment);
        background-image:
          radial-gradient(
            ellipse 80% 50% at 10% 0%,
            #fde68a55 0%,
            transparent 60%
          ),
          radial-gradient(
            ellipse 60% 40% at 90% 100%,
            #d9770622 0%,
            transparent 55%
          ),
          url("data:image/svg+xml,%3Csvg width='40' height='40' viewBox='0 0 40 40' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23d97706' fill-opacity='0.04'%3E%3Cpath d='M0 20h40M20 0v40' stroke='%23d97706' stroke-width='0.5'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
        padding: 3rem 1.5rem;
      }

      .container {
        max-width: 960px;
        margin: 0 auto;
      }

      .header-band {
        display: flex;
        align-items: flex-end;
        justify-content: space-between;
        gap: 1.5rem;
        margin-bottom: 2.5rem;
        flex-wrap: wrap;
      }

      .eyebrow {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        color: var(--amber);
        background: #fef3c755;
        border: 1px solid #f59e0b44;
        padding: 4px 12px;
        border-radius: 100px;
        margin-bottom: 10px;
      }

      .page-title {
        font-family: "Clash Display", sans-serif;
        font-size: clamp(2.4rem, 6vw, 4rem);
        font-weight: 700;
        color: var(--ink);
        line-height: 1;
        letter-spacing: -0.03em;
        position: relative;
      }

      .page-title span {
        position: relative;
        display: inline-block;
      }

      .page-title span::after {
        content: "";
        position: absolute;
        bottom: 2px;
        left: 0;
        width: 100%;
        height: 6px;
        background: linear-gradient(90deg, #f59e0b, #d97706);
        border-radius: 4px;
        z-index: -1;
        opacity: 0.35;
      }

      .subtitle {
        color: #92794a;
        font-size: 0.9rem;
        margin-top: 0.4rem;
        font-weight: 400;
      }

      /* --- Table card --- */
      .table-header {
        display: grid;
        grid-template-columns: 2fr 0.3fr 1.2fr 140px;
        padding: 14px 24px;
        background: var(--parchment-2);
        border-bottom: 1.5px solid var(--sand);
        font-size: 10.5px;
        font-weight: 700;
        letter-spacing: 0.15em;
        text-transform: uppercase;
        color: #b08040;
        gap: 12px;
      }

      .table-header .col-price,
      .table-header .col-date {
        text-align: center;
      }
      .table-header .col-actions {
        text-align: right;
      }

      .table-card {
        background: white;
        border-radius: 20px;
        border: 1.5px solid var(--sand);
        overflow: hidden;
        box-shadow:
          0 4px 0 #e8c97a,
          0 8px 32px #d9770618;
      }

      /* --- Product row --- */
      .product-row {
        display: grid;
        grid-template-columns: 2fr 0.3fr 1.2fr 140px;
        padding: 16px 24px;
        align-items: center;
        gap: 12px;
        border-bottom: 1px solid #f0e3cc;
        transition: background 0.15s;
        position: relative;
      }

      .product-row:last-child {
        border-bottom: none;
      }

      .product-row:hover {
        background: #fffaf2;
      }

      .product-row::before {
        content: "";
        position: absolute;
        left: 0;
        top: 0;
        bottom: 0;
        width: 3px;
        background: linear-gradient(180deg, #f59e0b, #d97706);
        opacity: 0;
        border-radius: 0 2px 2px 0;
        transition: opacity 0.15s;
      }
      .product-row:hover::before {
        opacity: 1;
      }

      .product-name-cell {
        display: flex;
        align-items: center;
        gap: 12px;
        min-width: 0;
      }

      .product-icon {
        width: 38px;
        height: 38px;
        border-radius: 10px;
        background: var(--parchment-2);
        border: 1px solid var(--sand);
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
        font-size: 16px;
      }

      .product-name {
        font-weight: 700;
        font-size: 14px;
        color: var(--ink);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .product-id {
        font-size: 11px;
        color: #c4a060;
        margin-top: 1px;
      }

      .price-cell {
        text-align: center;
      }

      .price-tag {
        display: inline-flex;
        align-items: baseline;
        gap: 2px;
        font-family: "Clash Display", sans-serif;
        font-weight: 600;
        font-size: 16px;
        color: var(--dark);
      }

      .price-tag .currency {
        font-size: 12px;
        color: #b08040;
        font-family: "Cabinet Grotesk", sans-serif;
        font-weight: 700;
      }

      .date-cell {
        text-align: center;
      }

      .date-badge {
        display: inline-flex;
        align-items: center;
        gap: 5px;
        font-size: 12px;
        font-weight: 700;
        padding: 5px 11px;
        border-radius: 8px;
        background: #fef9ee;
        border: 1px solid #f6d77e;
        color: #92520a;
      }

      /* --- Buttons --- */
      .btn-group {
        display: flex;
        gap: 10px;
        flex-shrink: 0;
        flex-wrap: wrap;
      }

      .btn {
        display: inline-flex;
        align-items: center;
        gap: 7px;
        font-family: "Cabinet Grotesk", sans-serif;
        font-weight: 700;
        font-size: 13px;
        padding: 10px 20px;
        border-radius: 10px;
        cursor: pointer;
        transition: all 0.18s ease;
        border: none;
        text-decoration: none;
      }

      .btn-gold {
        background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%);
        color: #fff;
        box-shadow:
          0 2px 0 #92400e,
          0 4px 16px #d9770640;
        position: relative;
        top: 0;
      }
      .btn-gold:hover {
        top: 1px;
        box-shadow:
          0 1px 0 #92400e,
          0 2px 8px #d9770640;
      }
      .btn-gold:active {
        top: 2px;
        box-shadow: none;
      }

      .btn-ghost {
        background: var(--parchment-2);
        color: var(--ink);
        border: 1.5px solid var(--sand);
        box-shadow: 0 1px 3px #b4904022;
      }
      .btn-ghost:hover {
        background: #f0e0c0;
        border-color: #c9a87c;
      }

      .btn svg {
        flex-shrink: 0;
      }
    </style>
    <main class="page-wrapper">{% block content %} {% endblock %}</main>
  </body>
</html>
